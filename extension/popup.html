<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureDownload AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #7d8590;
      --safe:        #22c55e;
      --safe-bg:     #0d2818;
      --warn:        #f59e0b;
      --warn-bg:     #2d1f00;
      --danger:      #ef4444;
      --danger-bg:   #2d0d0d;
      --accent:      #58a6ff;
      --radius:      8px;
    }

    body {
      width: 380px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── Header ─────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #58a6ff, #3b82f6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .header-title { font-size: 14px; font-weight: 600; }
    .header-sub   { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--safe);
      margin-left: auto;
      box-shadow: 0 0 6px var(--safe);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Manual Scan ─────────────────────────────────── */
    .scan-box {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .scan-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .scan-row {
      display: flex;
      gap: 6px;
    }

    .scan-input {
      flex: 1;
      padding: 7px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      outline: none;
      transition: border-color .2s;
    }
    .scan-input:focus  { border-color: var(--accent); }
    .scan-input::placeholder { color: var(--muted); }

    .scan-btn {
      padding: 7px 14px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .scan-btn:hover    { opacity: 0.85; }
    .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Inline Result Banner ────────────────────────── */
    .result-banner {
      margin: 12px 16px 0;
      border-radius: var(--radius);
      padding: 10px 12px;
      display: none;
      animation: slideIn .2s ease;
    }
    .result-banner.show { display: block; }

    @keyframes slideIn {
      from { transform: translateY(-6px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .result-banner.safe     { background: var(--safe-bg);   border: 1px solid var(--safe);   }
    .result-banner.warn     { background: var(--warn-bg);   border: 1px solid var(--warn);   }
    .result-banner.danger   { background: var(--danger-bg); border: 1px solid var(--danger); }

    .banner-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .banner-icon  { font-size: 16px; }
    .banner-title { font-size: 13px; font-weight: 600; }
    .banner-score { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .banner-msg   { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* ── Section Header ──────────────────────────────── */
    .section-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 12px 16px 6px;
    }

    /* ── Scan List ───────────────────────────────────── */
    .scan-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 0 16px 16px;
    }

    .scan-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      margin-bottom: 4px;
    }
    .scan-item:hover { border-color: var(--accent); background: var(--surface2); }

    .item-badge {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .item-badge.safe    { background: var(--safe-bg);   }
    .item-badge.warn    { background: var(--warn-bg);   }
    .item-badge.danger  { background: var(--danger-bg); }
    .item-badge.scanning{ background: var(--surface2);  }

    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-url  { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'JetBrains Mono', monospace; }

    .item-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .item-score.safe    { color: var(--safe);   }
    .item-score.warn    { color: var(--warn);   }
    .item-score.danger  { color: var(--danger); }
    .item-score.scanning{ color: var(--muted);  }

    /* ── Empty state ─────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-text { font-size: 12px; line-height: 1.5; }

    /* ── Footer ──────────────────────────────────────── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    .footer-text { font-size: 10px; color: var(--muted); }
    .footer-link { font-size: 10px; color: var(--accent); text-decoration: none; cursor: pointer; }
    .footer-link:hover { text-decoration: underline; }

    /* ── Spinner ─────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">🛡</div>
    <div>
      <div class="header-title">SecureDownload AI</div>
      <div class="header-sub">v1.0 · real-time protection</div>
    </div>
    <div class="status-dot" title="Active"></div>
  </div>

  <!-- Manual URL scan -->
  <div class="scan-box">
    <div class="scan-label">Scan a URL manually</div>
    <div class="scan-row">
      <input id="urlInput" class="scan-input" type="text" placeholder="https://example.com/file.exe" />
      <button id="scanBtn" class="scan-btn">Scan</button>
    </div>
  </div>

  <!-- Inline result banner (shown after manual scan) -->
  <div id="resultBanner" class="result-banner">
    <div class="banner-header">
      <span class="banner-icon" id="bannerIcon"></span>
      <span class="banner-title" id="bannerTitle"></span>
      <span class="banner-score" id="bannerScore"></span>
    </div>
    <div class="banner-msg" id="bannerMsg"></div>
  </div>

  <!-- Recent scans list -->
  <div class="section-label">Recent Downloads</div>
  <div class="scan-list" id="scanList">
    <div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">No downloads detected yet.<br/>Start downloading a file to see results.</div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">Powered by VirusTotal + ML</span>
    <a class="footer-link" id="openDocs">API Docs ↗</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
